<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PMO as Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e1014; --panel:#15191f; --panel-2:#1a1f27; --elev:#1e242d;
  --border:#272e39; --border-soft:#1d232c;
  --ink:#ece8df; --ink-2:#b7bdc8; --muted:#7f8896; --faint:#586172;
  --accent:#5b9bff; --accent-2:#8fbaff; --accent-deep:#3b7ae0;
  --accent-ink:#0a0d12; --accent-soft:rgba(91,155,255,.13); --accent-line:rgba(91,155,255,.4);
  --thread:#5b9bff; --thread-dim:rgba(91,155,255,.28);
  --ok:#3ecf8e; --warn:#f5b13d; --bad:#f0626c;
  --l1:#9aa6bd; --l2:#5b9bff; --l3:#79d3c4;
  --code-bg:#0b0e13; --code-ink:#d6dbe4; --code-border:#1c2230;
  --shadow:0 1px 0 rgba(255,255,255,.02), 0 8px 30px rgba(0,0,0,.35);
}
[data-theme="light"] {
  --bg:#f5f3ec; --panel:#ffffff; --panel-2:#fbfaf4; --elev:#ffffff;
  --border:#e5e0d3; --border-soft:#ece8dc;
  --ink:#181a1f; --ink-2:#3b424d; --muted:#646d7a; --faint:#99a0ad;
  --accent:#1f6feb; --accent-2:#1a5fcf; --accent-deep:#1a5fcf;
  --accent-ink:#ffffff; --accent-soft:rgba(31,111,235,.09); --accent-line:rgba(31,111,235,.32);
  --thread:#1f6feb; --thread-dim:rgba(31,111,235,.24);
  --ok:#16864c; --warn:#a96a14; --bad:#cf3540;
  --l1:#6b7585; --l2:#1f6feb; --l3:#1f8f7d;
  --code-bg:#0b0e13; --code-ink:#d6dbe4; --code-border:#1c2230;
  --shadow:0 1px 2px rgba(20,22,28,.04), 0 10px 30px rgba(20,22,28,.07);
}
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'Public Sans', -apple-system, system-ui, sans-serif; font-size: 16px; line-height: 1.65; -webkit-font-smoothing: antialiased; letter-spacing: -.003em; }
::selection { background: var(--accent); color: var(--accent-ink); }
::-webkit-scrollbar { width: 11px; height: 11px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; border: 3px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background: var(--faint); background-clip: content-box; }
a { color: inherit; }
button { font-family: inherit; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes blink { 50% { opacity: .25; } }
@keyframes nodePulse { 0% { box-shadow: 0 0 0 0 var(--thread-dim); } 70% { box-shadow: 0 0 0 7px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; scroll-behavior: auto !important; } }

/* Layout */
#app-header {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 18px; height: 60px; padding: 0 22px;
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 11px; text-decoration: none; color: var(--ink); }
.logo-icon { display: grid; place-items: center; width: 30px; height: 30px; border: 1px solid var(--accent-line); border-radius: 7px; background: var(--accent-soft); }
.logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; letter-spacing: -.02em; }
.logo-sep { color: var(--muted); font-weight: 500; }
.version-badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; }
.spacer { flex: 1; }
.search-box { display: flex; align-items: center; gap: 7px; width: 230px; max-width: 34vw; padding: 7px 11px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 13px; cursor: pointer; }
.search-box span:first-of-type { flex: 1; }
.kbd { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; }
.icon-btn { display: grid; place-items: center; width: 34px; height: 34px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: var(--ink-2); cursor: pointer; text-decoration: none; }
.theme-glyph { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

#app-body { display: flex; align-items: flex-start; }

#sidebar {
  position: sticky; top: 60px; flex: 0 0 282px; width: 282px;
  height: calc(100vh - 60px); overflow-y: auto;
  padding: 26px 16px 60px 24px;
  border-right: 1px solid var(--border);
}
.nav-group { margin-bottom: 22px; }
.nav-group-header { display: flex; align-items: center; gap: 8px; margin: 0 0 9px 4px; }
.layer-badge { display: grid; place-items: center; min-width: 17px; height: 17px; padding: 0 4px; border-radius: 5px; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--accent-ink); }
.nav-group-title { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.nav-link { display: flex; align-items: center; gap: 9px; text-decoration: none; font-size: 14px; padding: 6px 10px; margin: 1px 0; border-radius: 7px; border-left: 2px solid transparent; color: var(--ink-2); font-weight: 400; transition: background .12s, color .12s; }
.nav-link:hover { background: var(--accent-soft); color: var(--ink); }
.nav-link.active { border-left-color: var(--accent); color: var(--ink); background: var(--accent-soft); font-weight: 600; }
.nav-dot { flex: 0 0 auto; width: 5px; height: 5px; border-radius: 50%; background: var(--faint); }
.nav-link.active .nav-dot { background: var(--accent); }

#main-wrap { flex: 1; min-width: 0; display: flex; justify-content: center; }
#main-inner { display: flex; gap: 54px; width: 100%; max-width: 1240px; padding: 0 44px; }

#content { position: relative; flex: 1; min-width: 0; max-width: 780px; padding: 46px 0 120px; }

#on-this-page { position: sticky; top: 60px; flex: 0 0 188px; width: 188px; height: calc(100vh - 60px); overflow-y: auto; padding: 48px 0 60px; align-self: flex-start; }
.onpage-title { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-left: 14px; }
.onpage-list { position: relative; border-left: 1px solid var(--border); }
.onpage-link { display: block; font-size: 13px; color: var(--muted); text-decoration: none; padding: 5px 0 5px 14px; margin-left: -1px; border-left: 2px solid transparent; transition: color .12s, border-color .12s; }
.onpage-link:hover { color: var(--ink); border-left-color: var(--accent); }

/* Mono label */
.mono { font-family: 'JetBrains Mono', monospace; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); margin-bottom: 11px; }
.h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: clamp(34px, 5vw, 56px); line-height: 1.04; letter-spacing: -.03em; margin: 0 0 22px; text-wrap: balance; }
.h2 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 30px; letter-spacing: -.025em; line-height: 1.1; margin: 0 0 14px; }
.h2-sm { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 26px; letter-spacing: -.02em; margin: 0 0 6px; }
.lead { font-size: 20px; line-height: 1.55; color: var(--ink-2); max-width: 62ch; margin: 0 0 18px; }
.sub { font-size: 16px; color: var(--muted); max-width: 62ch; margin: 0 0 30px; }
.body { font-size: 17px; color: var(--ink-2); max-width: 60ch; margin: 0 0 24px; }
.caption { font-size: 13.5px; color: var(--muted); margin: 14px 2px 0; }

/* Cards */
.card { padding: 15px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 11px; }
.card-title { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
.card-body { font-size: 13.5px; color: var(--muted); line-height: 1.5; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Value pairs */
.value-pair { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 14px; padding: 13px 17px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; }
.value-pair.featured { border-color: var(--accent-line); box-shadow: 0 0 0 1px var(--accent-soft); }
.value-left { font-weight: 600; font-size: 15.5px; }
.value-over { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.value-right { color: var(--muted); text-align: right; font-size: 15px; }

/* Thread / timeline */
.thread-rail { position: relative; padding-left: 34px; border-left: 2px solid var(--thread-dim); }
.thread-node { position: absolute; left: -43px; top: 5px; width: 13px; height: 13px; border-radius: 50%; background: var(--bg); border: 2.5px solid var(--thread); box-shadow: 0 0 0 4px var(--accent-soft); }
.thread-node-lg { position: absolute; left: -41px; top: 14px; width: 15px; height: 15px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px var(--bg), 0 0 0 6px var(--accent-soft); }
.thread-node-sm { position: absolute; left: -40px; top: 14px; width: 13px; height: 13px; border-radius: 50%; background: var(--bg); border: 2.5px solid var(--accent); }
.thread-section { position: relative; margin-bottom: 62px; }
.thread-connector { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin: 0 0 8px 2px; }

/* Code block */
.code-block { background: var(--code-bg); border: 1px solid var(--code-border); border-radius: 12px; overflow: hidden; }
.code-titlebar { display: flex; align-items: center; gap: 8px; padding: 9px 13px; border-bottom: 1px solid var(--code-border); }
.traffic-light { width: 9px; height: 9px; border-radius: 50%; }
.code-filename { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #8a93a3; margin-left: 6px; }
.code-pre { margin: 0; padding: 16px 17px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.85; color: var(--code-ink); overflow-x: auto; }
.ck { color: #7fa6e6; } /* key */
.cv { color: #e6c07b; } /* value */
.cs { color: #79d3c4; } /* string/url */
.cc { color: #5d6675; } /* comment */

/* Kind badge */
.kind-badge { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--accent-ink); background: var(--l2); padding: 1.5px 7px; border-radius: 5px; }

/* Status pill */
.status-pill { display: inline-flex; align-items: center; gap: 9px; border-radius: 999px; padding: 7px 15px; font-weight: 700; font-size: 15px; }
.status-dot { width: 9px; height: 9px; border-radius: 50%; }

/* Nav prev/next */
.page-nav { display: flex; gap: 14px; margin-top: 64px; padding-top: 28px; border-top: 1px solid var(--border); }
.page-nav-link { flex: 1; text-decoration: none; border: 1px solid var(--border); border-radius: 11px; padding: 13px 16px; color: var(--ink); background: var(--panel); }
.page-nav-link.next { text-align: right; margin-left: auto; }
.page-nav-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.page-nav-title { font-weight: 600; font-size: 15px; }

/* Provenance footer */
.provenance { margin-top: 30px; padding: 14px 16px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 11px; display: flex; flex-wrap: wrap; align-items: center; gap: 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
.prov-sep { color: var(--border); }
.prov-ok { display: inline-flex; align-items: center; gap: 6px; }
.prov-ok-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }
.prov-edit { margin-left: auto; color: var(--accent); text-decoration: none; }

/* Hero badge */
.hero-badge { display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--accent); border: 1px solid var(--accent-line); background: var(--accent-soft); border-radius: 999px; padding: 5px 12px; margin-bottom: 24px; }
.hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.cta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; }
.btn-primary { display: inline-flex; align-items: center; gap: 9px; background: var(--accent); color: var(--accent-ink); font-weight: 600; font-size: 15px; text-decoration: none; padding: 11px 18px; border-radius: 9px; border: none; cursor: pointer; }
.btn-secondary { display: inline-flex; align-items: center; gap: 9px; background: var(--panel); color: var(--ink); border: 1px solid var(--border); font-weight: 600; font-size: 15px; text-decoration: none; padding: 11px 18px; border-radius: 9px; cursor: pointer; }

/* Reveal demo */
.reveal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
.reveal-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px 16px; min-height: 232px; }
.reveal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.rederive-btn { display: inline-flex; align-items: center; gap: 5px; background: transparent; border: 1px solid var(--border); border-radius: 7px; color: var(--ink-2); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 4px 9px; cursor: pointer; }
.spinner { width: 18px; height: 18px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
.blink { animation: blink 1s steps(1) infinite; }
.signal-list { position: relative; padding-left: 22px; border-left: 2px solid var(--thread-dim); display: grid; gap: 13px; }
.signal-item { position: relative; }
.signal-dot { position: absolute; left: -29px; top: 4px; width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 0 3px var(--bg); }
.signal-text { font-size: 13.5px; }

/* Layer cards */
.layer-card { display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: start; padding: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: 11px; }
.layer-num { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--accent-ink); }
.layer-card-title { font-weight: 600; font-size: 16px; margin-bottom: 3px; }
.layer-card-body { color: var(--muted); font-size: 14px; }

/* Explainer cards */
.explainer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.explainer-card { text-decoration: none; color: var(--ink); background: var(--panel); border: 1px solid var(--border); border-radius: 13px; padding: 20px; display: block; transition: border-color .15s; }
.explainer-card:hover { border-color: var(--accent); }
.explainer-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 8px; }
.explainer-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 18px; margin-bottom: 6px; }
.explainer-body { color: var(--muted); font-size: 14px; line-height: 1.5; }
.explainer-cta { color: var(--accent); font-weight: 600; font-size: 14px; margin-top: 12px; }

/* Shell page outline */
.shell-status { display: flex; align-items: center; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); margin-bottom: 16px; }
.shell-warn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); }
.outline-rail { position: relative; padding-left: 32px; border-left: 2px solid var(--thread-dim); display: grid; gap: 2px; }
.outline-item { position: relative; padding: 13px 0; border-bottom: 1px solid var(--border-soft); }
.outline-dot { position: absolute; left: -39px; top: 17px; width: 9px; height: 9px; border-radius: 50%; background: var(--bg); border: 2px solid var(--thread-dim); }
.outline-n { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--faint); margin-right: 12px; }
.outline-label { font-size: 15.5px; color: var(--ink-2); }

/* Rosetta table */
.rosetta-row { border: 1px solid var(--border); border-radius: 11px; overflow: hidden; margin-bottom: 10px; }
.rosetta-summary { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 14px; padding: 14px 18px; cursor: pointer; background: var(--panel); transition: background .12s; }
.rosetta-summary:hover { background: var(--panel-2); }
.rosetta-summary.open { background: var(--panel-2); border-bottom: 1px solid var(--border); }
.rosetta-before { font-size: 15px; color: var(--muted); }
.rosetta-arrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--faint); }
.rosetta-after { font-weight: 600; font-size: 15px; }
.rosetta-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 18px; background: var(--panel); }
.rosetta-yaml-label { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.rosetta-output { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }

/* Build status bar */
.build-bar { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.build-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid var(--border); }
.build-file { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--ink-2); }
.build-status { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ok); }
.build-status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }
.build-meta { display: grid; grid-template-columns: repeat(3, 1fr); }
.build-cell { padding: 13px 16px; }
.build-cell:not(:last-child) { border-right: 1px solid var(--border); }
.build-cell-label { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
.build-cell-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

/* Object model YAML full */
.yaml-full { margin: 0; padding: 20px 22px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.9; color: var(--code-ink); overflow-x: auto; }

/* Kind grid */
.kind-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.kind-card { padding: 14px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; }
.kind-name { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 13.5px; margin-bottom: 4px; color: var(--accent); }
.kind-desc { font-size: 13.5px; color: var(--muted); line-height: 1.45; }

/* Copy button */
.copy-btn {
  margin-left: auto; display: grid; place-items: center; width: 26px; height: 26px;
  background: transparent; border: 1px solid var(--code-border); border-radius: 6px;
  color: #5d6675; cursor: pointer; transition: background .12s, color .12s, border-color .12s;
}
.copy-btn:hover { background: rgba(255,255,255,.07); color: #aab; border-color: rgba(255,255,255,.18); }
.copy-btn.copied { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 40%, transparent); }
.copy-btn.copy-failed { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, transparent); }

/* Hamburger button */
#mobile-menu-btn {
  display: none; place-items: center; width: 34px; height: 34px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  color: var(--ink-2); cursor: pointer;
}

@media (max-width: 900px) {
  #sidebar { display: none; position: fixed; top: 60px; left: 0; bottom: 0; z-index: 50; width: 282px; background: var(--bg); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 16px 60px 24px; }
  #sidebar.mobile-open { display: block; }
  #mobile-menu-btn { display: grid; }
  #on-this-page { display: none; }
  #main-inner { padding: 0 20px; }
  .reveal-grid { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
  .explainer-grid { grid-template-columns: 1fr; }
  .rosetta-detail { grid-template-columns: 1fr; }
  .kind-grid { grid-template-columns: 1fr; }
  .build-meta { grid-template-columns: 1fr; }
  .build-cell:not(:last-child) { border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<header id="app-header">
  <button id="mobile-menu-btn" aria-label="Toggle navigation" title="Menu">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <a class="logo" href="#/" id="logo-link">
    <span class="logo-icon"><span class="logo-dot"></span></span>
    <span class="logo-text">PMO<span class="logo-sep">·</span>as<span class="logo-sep">·</span>Code</span>
  </a>
  <span class="version-badge mono">v1</span>

function renderAutomation() {
  return `
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:13px;">
        <span class="layer-badge" style="background:var(--l1);">1</span>
        <span class="mono" style="font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);">Layer 1 · Manifesto · Explainer 01</span>
      </div>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(28px,4vw,42px);line-height:1.06;letter-spacing:-.03em;margin:0 0 18px;text-wrap:balance;">Automation and audit over gates and approvals.</h1>
      <p style="font-size:18px;line-height:1.55;color:var(--ink-2);max-width:60ch;margin:0 0 32px;">Gates assume people misbehave unless blocked; audit assumes good faith and lets the record keep everyone honest.</p>

      <div id="shift" style="margin-bottom:48px;">
        <h2 class="h2-sm">The shift: from prevention to flow.</h2>
        <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 18px;">A gate is a friction point: a human in the loop who must approve before work proceeds. The gate slows flow, creates bottlenecks, and produces an inbox full of decisions that no one can later audit. The default posture becomes <em>stop until told otherwise</em>.</p>
        <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 18px;">Audit inverts the posture. The default is <em>flow</em>. The record keeps everyone honest: every change, every decision, every signal is captured in Git history and the Event Log. Accountability is a result of the record, not a precondition of work.</p>
        <div class="grid-2">
          <div class="card" style="border-top:2px solid var(--bad);">
            <div class="card-title" style="color:var(--bad);">Gates</div>
            <div class="card-body">An email in an inbox. A human bottleneck. An unauditable approval. Default posture: stop.</div>
          </div>
          <div class="card" style="border-top:2px solid var(--ok);">
            <div class="card-title" style="color:var(--ok);">Audit</div>
            <div class="card-body">Git history + Event Log. Every decision traceable. Default posture: flow.</div>
          </div>
        </div>
      </div>

      <div id="policy" style="margin-bottom:48px;">
        <h2 class="h2-sm">Gates don't vanish. They become policy as code.</h2>
        <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 18px;">The gate is demoted to an automated, auditable check, not an email in an inbox. When the check runs in CI, the result is in the commit log. When it passes, the audit trail writes itself.</p>
        <div class="code-block">
          <div class="code-titlebar">
            <span class="traffic-light" style="background:#ff5f57;"></span>
            <span class="traffic-light" style="background:#febc2e;"></span>
            <span class="traffic-light" style="background:#28c840;"></span>
            <span class="code-filename">.github/workflows/audit.yml</span>
          </div>
          <pre class="code-pre"><span class="ck">on</span>: [pull_request]
<span class="ck">jobs</span>:
  <span class="ck">audit</span>:
    <span class="ck">steps</span>:
      - <span class="ck">run</span>: <span class="cs">docunit validate documents/**/*.md</span>
  <span class="ck">consistency</span>:
    <span class="ck">steps</span>:
      - <span class="ck">run</span>: <span class="cs">docunit consistency</span>   <span class="cc"># broken traces block the merge</span></pre>
        </div>
      </div>

      <div id="tension" style="margin-bottom:48px;">
        <h2 class="h2-sm">Where gates still belong.</h2>
        <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 18px;">Some contexts legally require a human signature. A regulatory filing, a board resolution, a contractual approval — these are real requirements that the framework holds gracefully. The PMO as Code position is not that human approvals should disappear. It's that they should be the documented exception, not the default.</p>
        <div class="card" style="border-left:3px solid var(--warn);">
          <div class="card-title">When a human signature is required</div>
          <div class="card-body" style="margin-top:6px;">Model it explicitly: a <code style="font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--panel-2);padding:1px 4px;border-radius:3px;">Policy</code> kind with <code style="font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--panel-2);padding:1px 4px;border-radius:3px;">requires: [human-signature]</code>. The signature event lands in the Event Log. The audit trail still writes itself. The difference is that one of the signals is a person's explicit approval, not just a CI check.</div>
        </div>
      </div>

      ${pageNavHtml('/manifesto/automation')}
      ${provenanceFooter('/manifesto/automation')}
    </div>`;
}

      <p style="font-size:18px;line-height:1.55;color:var(--ink-2);max-width:60ch;margin:0 0 32px;">The unit of value is the link, not the document. Thin artifacts, richly connected.</p>

        <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 18px;">Dense documentation is a trap. A 40-page Word doc describes a project in exhaustive detail, but it can't tell you <em>why</em> a status is red or which decision accepted the risk that caused it. You have to read everything to find anything.</p>
        <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 18px;">Traceability replaces density with linkage. Thin artifacts — a charter, a RAID entry, a decision record — each with a stable ID and typed references to each other. A reader can walk from any status to the root cause in five hops, without opening a deck.</p>

function renderConcepts() {

<span class="ck">kind</span>: <span class="cv">charter</span>

        ${cb('the chain, across four documents', `<span class="ck">**BR-001**</span>: The business shall reduce onboarding time to under 2 days.
<span class="ck">**PR-014**</span> (<span class="cv">traces</span>: BR-001): The product shall provide a self-serve flow.

      <div id="checks" style="margin-bottom:52px;">

function renderWhy() {
  return `<div>
    <div class="eyebrow">Why PMO as Code</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(32px,4.5vw,46px);line-height:1.05;letter-spacing:-.03em;margin:0 0 18px;text-wrap:balance;">The problem, sharply drawn.</h1>
    <p style="font-size:18px;line-height:1.55;color:var(--ink-2);max-width:60ch;margin:0 0 36px;">Today's PMO runs on PowerPoint, Excel, SharePoint, and email. Every artifact is stale by the time anyone reads it. This is not a tooling problem. It's an architectural one.</p>

    <div class="thread-rail">

      <section class="thread-section" id="status-quo">
        <span class="thread-node"></span>
        <div class="eyebrow">The status quo</div>
        <h2 class="h2">Four tools, zero truth.</h2>
        <p class="body">A portfolio runs across PowerPoint decks, Excel spreadsheets, SharePoint wikis, and approval email chains. None of them talk to each other. None of them are authoritative. All of them are someone's best guess at what was true last Thursday.</p>
        <div class="grid-2">
          <div class="card"><div class="card-title">PowerPoint</div><div class="card-body">Status decks updated weekly by a PM whose main job is finding numbers to put in the deck.</div></div>
          <div class="card"><div class="card-title">Excel</div><div class="card-body">RAID logs, budget trackers, roadmaps — each maintained by a different person with a different definition of "current."</div></div>
          <div class="card"><div class="card-title">SharePoint</div><div class="card-body">Charters, governance docs, templates — mostly the version from the last project, lightly renamed.</div></div>
          <div class="card"><div class="card-title">Email</div><div class="card-body">The approval chain. A thread where someone said "looks good" that is now impossible to find or audit.</div></div>
        </div>
      </section>

      <section class="thread-section" id="stale">
        <span class="thread-node"></span>
        <div class="eyebrow">Problem 1</div>
        <h2 class="h2">Stale on arrival.</h2>
        <p class="body">A deck takes hours to build. By the time it's distributed, the schedule has slipped, the budget number has changed, and the risk that was escalated yesterday isn't in it. The act of creating the artifact is the moment it becomes out of date.</p>
        <p class="body">The problem is structural, not procedural. Hand-maintained artifacts can only ever reflect what someone knew at the moment they saved the file. There is no mechanism to keep them current because the data they summarize lives somewhere else entirely.</p>
        <div class="card" style="border-left:3px solid var(--bad);">
          <div class="card-title">The cost</div>
          <div class="card-body" style="margin-top:4px;">Decisions are made on stale data. Leaders optimize for the reality inside the deck, not the portfolio outside it. The gap between the two grows silently until something fails visibly.</div>
        </div>
      </section>

      <section class="thread-section" id="rag">
        <span class="thread-node"></span>
        <div class="eyebrow">Problem 2</div>
        <h2 class="h2">RAG is self-reported fiction.</h2>
        <p class="body">Every PM in the portfolio decides whether their project is green, amber, or red. The criteria are informal. The incentive is to stay green. The result is a portfolio dashboard where everything is green until the moment something catastrophically fails.</p>
        <p class="body">Amber means whatever the PM wants it to mean this week. Red requires courage and often a difficult conversation. The signal that matters most — the honest one — is the one the system is least likely to produce.</p>
        <div class="card" style="border-left:3px solid var(--warn);">
          <div class="card-title">What derived status does instead</div>
          <div class="card-body" style="margin-top:4px;">Status is computed from real signals: schedule variance from your project tracker, budget burn rate from finance, open incident count from your ops tooling. Nobody picks amber. The record does. The colour becomes a result, not an assertion.</div>
        </div>
      </section>

      <section class="thread-section" id="governance">
        <span class="thread-node"></span>
        <div class="eyebrow">Problem 3</div>
        <h2 class="h2">Governance you can't audit.</h2>
        <p class="body">A stage gate is an email. Someone forwards a deck. Someone replies "approved." Three months later, no one can find the thread, no one agrees on what was actually approved, and there's no record of what conditions the approval was contingent on.</p>
        <p class="body">When a regulator, an auditor, or a postmortem asks "who approved this and under what conditions?", the answer is "we think it was Dave, in an email, sometime in March." That is not an audit trail. It's a guess.</p>
        <div class="card" style="border-left:3px solid var(--ok);">
          <div class="card-title">What policy as code does instead</div>
          <div class="card-body" style="margin-top:4px;">A gate is a CI check. It runs against defined criteria, passes or fails, and the result is a commit in the repository. The approval is a merged PR with a reviewer on record. The audit trail writes itself.</div>
        </div>
      </section>

      <section class="thread-section" id="army">
        <span class="thread-node"></span>
        <div class="eyebrow">Problem 4</div>
        <h2 class="h2">The army-of-PMs tax.</h2>
        <p class="body">In a mature portfolio, a significant fraction of PM headcount exists not to run projects but to maintain the reporting layer above them. Someone collects status from each project lead. Someone turns that into a portfolio summary. Someone formats it into a slide. Someone presents the slide. None of this is project delivery.</p>
        <p class="body">PMO as Code eliminates this layer. Status is derived, not collected. Dashboards are rendered, not built. The PM's job is to run the project, not to describe it.</p>
        <div class="card" style="border-left:3px solid var(--accent);">
          <div class="card-title">The reallocation</div>
          <div class="card-body" style="margin-top:4px;">The time formerly spent on reporting moves to delivery. One source of truth means one update — the YAML — that everything downstream regenerates from automatically.</div>
        </div>
      </section>

    </div>

    <div style="margin-top:48px;padding:22px 24px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:13px;">
      <div class="eyebrow" style="margin-bottom:8px;">What comes next</div>
      <p style="font-size:16px;color:var(--ink);margin:0 0 16px;max-width:60ch;">The Manifesto names five value-pairs that encode the response to these problems. The Rosetta Stone maps each problem to its as-code equivalent. Core Concepts shows what the object model that holds it all together looks like.</p>
      <div style="display:flex;flex-wrap:wrap;gap:10px;">
        <a class="btn-primary" href="#/manifesto">Read the manifesto →</a>
        <a class="btn-secondary" href="#/rosetta">The Rosetta Stone →</a>
      </div>
    </div>

    ${pageNavHtml('/why')}
    ${provenanceFooter('/why')}
  </div>`;
}

function renderIntegrations() {

    <p style="font-size:18px;line-height:1.55;color:var(--ink-2);max-width:60ch;margin:0 0 8px;">There are no connectors to build or maintain. The whole pipeline is Git, GitHub Actions, and — only for the advisory layer — the Anthropic API. Nothing else to wire up, nothing else to break.</p>
    <p style="font-size:14px;color:var(--muted);margin:0 0 36px;">Feed Claude any source document; it maps it to the standard templates. From there it's version control the whole way down.</p>

    <div id="int-actions" style="margin-bottom:52px;">
      <h2 class="h2-sm">GitHub Actions.</h2>
      <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 16px;">Two jobs run on every pull request: <code class="mono" style="font-size:13px;background:var(--panel-2);padding:1px 4px;border-radius:3px;">audit</code> validates each changed document, and <code class="mono" style="font-size:13px;background:var(--panel-2);padding:1px 4px;border-radius:3px;">consistency</code> checks the whole traceability graph. Both post their results as a PR comment.</p>
      ${cb('.github/workflows/audit.yml', `<span class="ck">on</span>: [pull_request]
<span class="ck">jobs</span>:
  <span class="ck">audit</span>:          <span class="cc"># validate each changed document</span>
    <span class="ck">runs-on</span>: ubuntu-latest
    <span class="ck">steps</span>:
      - <span class="ck">run</span>: <span class="cs">docunit validate documents/**/*.md</span>
  <span class="ck">consistency</span>:    <span class="cc"># check the whole graph (a change can break links elsewhere)</span>
    <span class="ck">runs-on</span>: ubuntu-latest
    <span class="ck">steps</span>:
      - <span class="ck">run</span>: <span class="cs">docunit consistency && docunit rtm --out RTM.md</span>`)}
    </div>

    <div id="int-protection" style="margin-bottom:52px;">
      <h2 class="h2-sm">Branch protection.</h2>
      <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 16px;">Require both checks on <code class="mono" style="font-size:13px;background:var(--panel-2);padding:1px 4px;border-radius:3px;">main</code>. Now a document that fails validation — or a broken requirements trace — cannot merge. The gate is binding, not advisory.</p>
      ${cb('terminal', `<span class="cc"># require both checks before a PR can merge</span>
gh api -X PUT repos/OWNER/REPO/branches/main/protection \\
  --input - &lt;&lt;'JSON'
{ <span class="ck">"required_status_checks"</span>:
    { <span class="ck">"strict"</span>: true, <span class="ck">"contexts"</span>: [<span class="cs">"audit"</span>, <span class="cs">"consistency"</span>] } }
JSON`)}
    </div>

    <div id="int-ai" style="margin-bottom:52px;">
      <h2 class="h2-sm">The Anthropic API.</h2>
      <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 16px;">The one external service, and only for the <em>advisory</em> layer: the AI reads a document (or a traceability link) and scores it. Set one repo secret to switch it on. It fails safe — no key, and the advisory checks simply skip; the deterministic gate is unaffected.</p>

gh secret set ANTHROPIC_API_KEY --repo OWNER/REPO

function renderAdoption() {

    <p style="font-size:18px;line-height:1.55;color:var(--ink-2);max-width:60ch;margin:0 0 8px;">A staged path from your first document to a fully traceable document set. You don't need to do everything at once. Each stage delivers real value independently.</p>
    <p style="font-size:14px;color:var(--muted);margin:0 0 36px;">Crawl is an afternoon. Walk is the habit shift — the gate on every PR. Run is turning on cross-document consistency across the whole set.</p>

    <div class="thread-rail">

      <section class="thread-section" id="crawl">
        <span class="thread-node"></span>
        <div style="display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:var(--ok);border:1px solid color-mix(in srgb, var(--ok) 40%, transparent);background:color-mix(in srgb, var(--ok) 12%, transparent);border-radius:999px;padding:4px 12px;margin-bottom:12px;">Stage 1 · Crawl</div>
        <h2 class="h2-sm">One document, validated.</h2>
        <p class="body">Pick one document. Author <code class="mono" style="font-size:13px;background:var(--panel-2);padding:1px 4px;border-radius:3px;">documents/charters/aurora.md</code> — frontmatter and the required sections. Run <code class="mono" style="font-size:13px;background:var(--panel-2);padding:1px 4px;border-radius:3px;">docunit validate</code> locally. That's it. You have a versioned, schema-checked document in a place with history.</p>

            <div class="card-title">What you skip</div>
            <div class="card-body" style="margin-top:4px;line-height:1.6;">CI, cross-document consistency, and the AI layer — all optional at this stage. You're building the habit of truth-in-Git before you automate on top of it.</div>

            <div class="card-title">Typical timeline</div>
            <div class="card-body" style="margin-top:4px;line-height:1.6;">About a day to wire the Action and require the check on <code class="mono" style="font-size:12px;background:var(--panel-2);padding:1px 4px;border-radius:3px;">main</code>. Most of the effort is agreeing the criteria with stakeholders.</div>
          </div>
        </div>
        <div style="margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);">
          Checklist: <span style="color:var(--ok);">audit.yml ✓</span> · <span style="color:var(--ok);">branch protection ✓</span> · <span style="color:var(--ok);">3+ kinds ✓</span>
        </div>
      </section>

      <section class="thread-section" id="run">
        <span class="thread-node"></span>
        <div style="display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:var(--accent);border:1px solid var(--accent-line);background:var(--accent-soft);border-radius:999px;padding:4px 12px;margin-bottom:12px;">Stage 3 · Run</div>
        <h2 class="h2-sm">Full set. Consistency. Traceability matrix.</h2>
        <p class="body">Every document kind in Git, with the cross-document <code class="mono" style="font-size:13px;background:var(--panel-2);padding:1px 4px;border-radius:3px;">consistency</code> job enforcing traceability, the AI advisory layer on, and the RTM generated on every change. Requirements trace end to end; broken links block; the matrix is derived, not drawn.</p>
        <div class="grid-2">
          <div class="card" style="border-top:2px solid var(--accent);">
            <div class="card-title">What you get</div>
            <div class="card-body" style="margin-top:4px;line-height:1.6;">Every requirement traces to a test. Broken links are blocked. The AI flags weak links for review. A generated traceability matrix that's always current — no one maintains it by hand.</div>
          </div>
          <div class="card">
            <div class="card-title">The run claim</div>
            <div class="card-body" style="margin-top:4px;line-height:1.6;">At run, you can answer "which requirements have no test?" in seconds from the graph, without calling anyone or reading a deck.</div>
          </div>
        </div>
        <div style="margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);">
          Checklist: <span style="color:var(--ok);">consistency required ✓</span> · <span style="color:var(--ok);">AI advisory on ✓</span> · <span style="color:var(--ok);">RTM generated ✓</span>
        </div>
      </section>

    </div>

    ${pageNavHtml('/adoption')}
    ${provenanceFooter('/adoption')}
  </div>`;
}

function renderVs() {
  const rows = [
    { traditional: 'Status deck (weekly, manual)', ascode: 'Audit result, posted on every PR', win: 'ascode' },
    { traditional: 'RAG self-reported by the PM', ascode: 'Deterministic checks decide pass/fail', win: 'ascode' },
    { traditional: 'Approval email chain', ascode: 'A required check + a merged PR', win: 'ascode' },
    { traditional: 'Charter in Word, v47_FINAL.docx', ascode: 'charter.md, versioned, schema-validated', win: 'ascode' },
    { traditional: 'RAID log in Excel, shared drive', ascode: 'Risk register in Git, reviewed by PR', win: 'ascode' },
    { traditional: 'Requirements drifting across 6 docs', ascode: 'One traceability graph, checked in CI', win: 'ascode' },
    { traditional: '"Who approved this?" — email search', ascode: 'git log + the merged PR reviewer', win: 'ascode' },
    { traditional: 'PM headcount for the reporting layer', ascode: 'One docunit run per pull request', win: 'ascode' },
    { traditional: 'Human signature required (regulatory)', ascode: 'A required reviewer, recorded in Git', win: 'tie' },
    { traditional: 'Tool-trained PMs, high switching cost', ascode: 'Any compliant tool, vendor-neutral standard', win: 'ascode' },
  ];

  return `<div>
    <div class="eyebrow">Compare</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(32px,4.5vw,46px);line-height:1.05;letter-spacing:-.03em;margin:0 0 18px;text-wrap:balance;">vs Traditional PPM.</h1>
    <p style="font-size:18px;line-height:1.55;color:var(--ink-2);max-width:60ch;margin:0 0 8px;">An honest comparison. We make strong claims and show our work, including where traditional approaches still win.</p>
    <p style="font-size:14px;color:var(--muted);margin:0 0 36px;">PPM = Project & Portfolio Management (tools like MS Project, Planview, Clarity, Smartsheet).</p>

    <div id="comparison" style="margin-bottom:52px;">
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:14px;padding:10px 18px;margin-bottom:6px;">
        <span class="mono" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);">Traditional PPM</span>
        <span></span>
        <span class="mono" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);text-align:right;">PMO as Code</span>
      </div>
      ${rows.map(r => `
        <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;padding:13px 18px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;">
          <span style="font-size:14.5px;color:${r.win==='ascode'?'var(--muted)':'var(--ink)'};">${r.traditional}</span>
          <span style="width:18px;height:18px;border-radius:50%;background:${r.win==='ascode'?'var(--ok)':r.win==='tie'?'var(--warn)':'var(--bad)'};display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;font-weight:700;">${r.win==='ascode'?'→':r.win==='tie'?'≈':'←'}</span>
          <span style="font-size:14.5px;font-weight:${r.win==='ascode'?'600':'400'};color:${r.win==='ascode'?'var(--ink)':'var(--muted)'};text-align:right;">${r.ascode}</span>
        </div>`).join('')}
      <div style="display:flex;align-items:center;gap:18px;margin-top:10px;font-size:13px;color:var(--muted);">
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;border-radius:50%;background:var(--ok);display:inline-block;"></span> PMO as Code wins</span>
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;border-radius:50%;background:var(--warn);display:inline-block;"></span> Context-dependent</span>
      </div>
    </div>

    <div id="where-wins" style="margin-bottom:48px;">
      <h2 class="h2-sm">Where as-code wins clearly.</h2>
      <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 18px;">Any situation where the cost of stale data is higher than the cost of learning YAML. Portfolios with more than ~5 projects. Organisations where audit and traceability matter. Teams that already use Git.</p>
      <div class="grid-2">
        <div class="card" style="border-left:3px solid var(--ok);">
          <div class="card-title">Engineering-led orgs</div>
          <div class="card-body" style="margin-top:4px;">Git is already the source of truth for code. Extending it to the portfolio is a small step, not a cultural revolution.</div>
        </div>
        <div class="card" style="border-left:3px solid var(--ok);">
          <div class="card-title">Regulated industries</div>
          <div class="card-body" style="margin-top:4px;">An immutable audit trail in Git — who changed what, when, and who approved it — satisfies most audit requirements better than email threads can.</div>
        </div>
      </div>
    </div>

    <div id="where-gates" style="margin-bottom:48px;">
      <h2 class="h2-sm">Where traditional gates still belong.</h2>
      <p style="font-size:16px;color:var(--ink-2);max-width:60ch;margin:0 0 18px;">We are not arguing that human judgment disappears. Some decisions genuinely require a named individual's sign-off: a legal filing, a board resolution, a contractual milestone payment. PMO as Code holds these gracefully: require a named reviewer on the pull request, recorded immutably in the Git history — a stronger record than an approval email that no one can find later.</p>
      <div class="card" style="border-left:3px solid var(--warn);">
        <div class="card-title">The honest position</div>
        <div class="card-body" style="margin-top:4px;line-height:1.6;">Gates don't vanish. They get demoted from default to exception. The default posture is flow. The gate is the documented exception. When a human signature is genuinely required, it belongs in the framework as a first-class construct, not as an email chain that falls outside the audit trail.</div>
      </div>
    </div>

    ${pageNavHtml('/vs')}
    ${provenanceFooter('/vs')}
  </div>`;
}

function renderFAQ() {
  const faqs = [
    { q: 'Is this just another PPM tool?', a: 'No. PMO as Code is a vendor-neutral standard: business documents as Markdown with defined schemas and audit criteria, validated in Git. docunit is a reference implementation that shows it working end to end, but any tool that reads the templates and criteria conforms. There is no product to buy.' },
    { q: 'What about regulators who require a human signature?', a: 'A merged pull request with a named reviewer is the signature — timestamped and immutable in the Git history. Where a specific named sign-off is legally required, require that reviewer in branch protection, or add a signed-off field the audit checks for. The record writes itself, and it is far more auditable than an approval email no one can find.' },
    { q: 'Do we have to move everything to Git at once?', a: 'No. Start with one document. Validate it locally. Add the GitHub Actions gate when you are ready, then turn on cross-document consistency. Crawl, walk, run — each stage delivers value on its own, and nothing forces a big-bang migration.' },
    { q: 'Can the AI block a merge?', a: 'No — and that is deliberate. The deterministic structural checks (required fields, measurable success criteria, resolving requirement links) are what block a merge, because they are reliable. The AI checks are advisory: they score a document or a traceability link and post the reasoning to the pull request, but never gate it. They run via the Anthropic API and fail safe — with no key, they simply skip.' },
    { q: 'What if my organisation doesn\'t use Git?', a: 'The whole model assumes version control, and in practice almost every organisation already has Git somewhere — start there. If version control is genuinely absent, that conversation happens upstream of this framework, because a single versioned source of truth is the entire premise.' },
    { q: 'How is this different from a spreadsheet with strict conventions?', a: 'Three things a spreadsheet cannot do: schema validation (so the conventions actually hold), a queryable traceability graph across documents (so you can see that every requirement traces to a test), and a merge gate that blocks non-conforming changes before they land. A spreadsheet with conventions still relies on a human to keep it honest.' },
    { q: 'What is docunit, exactly?', a: 'docunit is the reference implementation: a small Python CLI and GitHub Action that validates each document against its criteria, checks cross-document consistency, and generates the traceability matrix. It is the standard in action, not the product — its output format is what a compliant tool conforms to.' },
    { q: 'Who owns the standard?', a: 'No one — it is vendor-neutral, like the Agile Manifesto or HTTP. The Manifesto (Layer 1) is the stable core. The reference approach and its templates, criteria, and conversion skill (Layer 2) are maintained here as a public library you can fork. Profiles (Layer 3) are community-owned.' },
  ];

  return `<div>
    <div class="eyebrow">Compare</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(32px,4.5vw,46px);line-height:1.05;letter-spacing:-.03em;margin:0 0 18px;text-wrap:balance;">FAQ.</h1>
    <p style="font-size:18px;line-height:1.55;color:var(--ink-2);max-width:60ch;margin:0 0 36px;">The questions every audience asks first.</p>

    <div id="faq-list" style="display:grid;gap:3px;">
      ${faqs.map((f, i) => `
        <div class="faq-item" style="border:1px solid var(--border);border-radius:11px;overflow:hidden;">
          <button class="faq-btn" data-faq="${i}" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;background:var(--panel);border:none;color:var(--ink);cursor:pointer;text-align:left;">
            <span style="font-weight:600;font-size:16px;">${f.q}</span>
            <span class="faq-chevron" data-faq-chevron="${i}" style="flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);transition:transform .2s;">+</span>
          </button>
          <div class="faq-answer" id="faq-answer-${i}" style="display:none;padding:0 18px 16px;background:var(--panel);border-top:1px solid var(--border);">
            <p style="font-size:15.5px;color:var(--ink-2);line-height:1.65;margin:14px 0 0;max-width:62ch;">${f.a}</p>
          </div>
        </div>`).join('')}
    </div>

    ${pageNavHtml('/faq')}
    ${provenanceFooter('/faq')}
  </div>`;
}

function renderShell(route) {
  const shell = SHELLS[route];
  if (!shell) return '';
  return `
    <div>
      <div class="eyebrow">${shell.eyebrow}</div>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(30px,4vw,42px);line-height:1.06;letter-spacing:-.03em;margin:0 0 18px;text-wrap:balance;">${shell.title}</h1>
      <p style="font-size:18px;line-height:1.55;color:var(--ink-2);max-width:60ch;margin:0 0 34px;">${shell.lead}</p>
      <div class="shell-status">
        <span class="shell-warn-dot"></span>
        SPEC · content lands in the Claude Code build
      </div>
      <div class="outline-rail">
        ${shell.outline.map((label, i) => `
          <div class="outline-item">
            <span class="outline-dot"></span>
            <span class="outline-n">${String(i + 1).padStart(2, '0')}</span>
            <span class="outline-label">${label}</span>
          </div>`).join('')}
      </div>
      ${pageNavHtml(route)}
      ${provenanceFooter(route)}
    </div>`;
}

// ─── Sidebar renderer ─────────────────────────────────────────────────────────
function renderSidebar(route) {
  return NAV.map(group => `
    <div class="nav-group">
      <div class="nav-group-header">
        ${group.layer ? `<span class="layer-badge" style="background:${group.color};">${group.layer}</span>` : ''}
        <span class="nav-group-title">${group.title}</span>
      </div>
      ${group.items.map(([label, r]) => `
        <a class="nav-link ${route === r ? 'active' : ''}" href="#${r}">
          <span class="nav-dot"></span>
          <span>${label}</span>
        </a>`).join('')}
    </div>`).join('');
}

// ─── On-this-page renderer ────────────────────────────────────────────────────
function renderOnThisPage(route) {
  const anchors = ANCHORS[route];
  if (!anchors || !anchors.length) return '';
  return `
    <div class="onpage-title">On this page</div>
    <div class="onpage-list">
      ${anchors.map(([id, label]) => `
        <a class="onpage-link" href="#${id}" data-anchor="${id}">${label}</a>`).join('')}
    </div>`;
}

// ─── Router ───────────────────────────────────────────────────────────────────
function getPageHtml(route) {
  if (route === '/') return renderHome();
  if (route === '/manifesto') return renderManifesto();
  if (route === '/manifesto/automation') return renderAutomation();
  if (route === '/manifesto/traceability') return renderTraceability();
  if (route === '/rosetta') return renderRosetta();
  if (route === '/concepts') return renderConcepts();
  if (route === '/why') return renderWhy();
  if (route === '/quickstart') return renderQuickstart();
  if (route === '/guides') return renderGuides();
  if (route === '/reference') return renderReference();
  if (route === '/integrations') return renderIntegrations();
  if (route === '/profiles') return renderProfiles();
  if (route === '/adoption') return renderAdoption();
  if (route === '/vs') return renderVs();
  if (route === '/faq') return renderFAQ();
  if (SHELLS[route]) return renderShell(route);
  return `<div><div class="eyebrow">404</div><h1 class="h1">Page not found.</h1><a href="#/" style="color:var(--accent);">← Home</a></div>`;
}

// ─── Mount / update ───────────────────────────────────────────────────────────
const $sidebar = document.getElementById('sidebar');
const $content = document.getElementById('content');
const $onpage  = document.getElementById('on-this-page');
const $body    = document.querySelector('[data-theme]') || document.documentElement;
const $themeGlyph = document.getElementById('theme-glyph');

function setTheme(t) {
  state.theme = t;
  document.documentElement.setAttribute('data-theme', t);
  $themeGlyph.textContent = t === 'dark' ? '☾' : '☀';
}

function render() {
  const { route } = state;
  $sidebar.innerHTML = renderSidebar(route);
  $content.innerHTML = getPageHtml(route);
  $onpage.innerHTML  = renderOnThisPage(route);

  // Wire rosetta rows
  if (route === '/rosetta') {
    document.querySelectorAll('.rosetta-summary').forEach(el => {
      el.addEventListener('click', () => {
        const i = el.dataset.row;
        const detail = document.getElementById(`detail-${i}`);
        const isOpen = detail.style.display !== 'none';
        detail.style.display = isOpen ? 'none' : 'grid';
        el.classList.toggle('open', !isOpen);
      });
    });
  }

  // Wire rederive button
  const rederiveBtn = document.getElementById('rederive-btn');
  if (rederiveBtn) {
    rederiveBtn.addEventListener('click', () => {
      state.revealed = false;
      document.getElementById('reveal-output').innerHTML = REVEAL_COMPUTING;
      clearTimeout(window._rd);
      window._rd = setTimeout(() => {
        state.revealed = true;
        document.getElementById('reveal-output').innerHTML = REVEAL_PASS;
      }, 1100);
    });
  }

  // Wire copy buttons
  const COPY_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  const CHECK_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;

  // Copy text with a legacy execCommand fallback for contexts where the
  // async Clipboard API is unavailable or permission-denied (e.g. non-HTTPS,
  // unfocused/embedded frames). Returns a promise resolving to true on success.
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).then(() => true).catch(() => legacyCopy(text));
    }
    return Promise.resolve(legacyCopy(text));
  }
  function legacyCopy(text) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.cssText = 'position:absolute;left:-9999px;top:0;';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e) {
      return false;
    }
  }

  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const pre = document.getElementById(btn.dataset.copyId);
      if (!pre) return;
      copyText(pre.innerText).then(ok => {
        btn.classList.add(ok ? 'copied' : 'copy-failed');
        btn.innerHTML = ok ? CHECK_ICON : COPY_ICON;
        btn.title = ok ? 'Copied' : 'Copy failed — select manually';
        setTimeout(() => {
          btn.classList.remove('copied', 'copy-failed');
          btn.innerHTML = COPY_ICON;
          btn.title = 'Copy';
        }, 1800);
      });
    });
  });

  // Wire FAQ accordion
  document.querySelectorAll('.faq-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = btn.dataset.faq;
      const answer = document.getElementById(`faq-answer-${i}`);
      const chevron = document.querySelector(`[data-faq-chevron="${i}"]`);
      const isOpen = answer.style.display !== 'none';
      answer.style.display = isOpen ? 'none' : 'block';
      if (chevron) chevron.textContent = isOpen ? '+' : '−';
    });
  });

  // Close mobile sidebar on nav click
  document.querySelectorAll('#sidebar a').forEach(a => {
    a.addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('mobile-open');
    });
  });

  window.scrollTo({ top: 0, behavior: 'auto' });
}

// ─── Events ───────────────────────────────────────────────────────────────────
window.addEventListener('hashchange', () => {
  state.route = location.hash.slice(1) || '/';
  state.revealed = false;
  render();
  setTimeout(() => {
    state.revealed = true;
    const out = document.getElementById('reveal-output');
    if (out && state.route === '/') {
      out.innerHTML = REVEAL_PASS;
    }
  }, 500);
});

document.getElementById('mobile-menu-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('mobile-open');
});

document.getElementById('theme-btn').addEventListener('click', () => {
  setTheme(state.theme === 'dark' ? 'light' : 'dark');
});

document.getElementById('logo-link').addEventListener('click', e => {
  e.preventDefault();
  location.hash = '/';
});

// Anchor scroll
document.addEventListener('click', e => {
  const anchor = e.target.closest('[data-anchor]');
  if (anchor) {
    e.preventDefault();
    scrollTo(anchor.dataset.anchor);
  }
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
setTheme('dark');
render();
setTimeout(() => {
  state.revealed = true;
  const out = document.getElementById('reveal-output');
  if (out && state.route === '/') {
    out.innerHTML = REVEAL_PASS;
  }
}, 600);
</script>
</body>
</html>
