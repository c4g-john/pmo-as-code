name: deploy retry

# A job inside a failing run cannot rerun its own run (GitHub refuses with
# "already running"). This fires after a site deploy completes, retries the
# first failure, and lets a second failure stay red for the CI-health
# sentinel.
on:
  workflow_run:
    workflows: ["site deploy"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: gh run rerun "$RUN_ID" --repo "$GITHUB_REPOSITORY" --failed
