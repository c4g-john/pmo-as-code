name: site check

# PR gate for the Astro build. The build itself runs the postbuild dist gate
# (heading hierarchy, JSON-LD) and Pagefind indexing, so a structural
# regression on any page fails this check before it can merge.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # page dateModified is derived from git history
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_TOKEN: ${{ github.token }} # authenticated adoption-count fetch
