name: site check

# The site is a hand-bundled SPA with prerendered per-route snapshots. This
# runs the prerenderer (which executes every page module, so a JS syntax error
# fails the build) and confirms the committed snapshots match the source.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  prerender:
    runs-on: macos-latest   # prerender.py renders via JavaScriptCore (osascript)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Render every route
        run: python3 scripts/prerender.py
      - name: Fail if snapshots drifted from source
        run: |
          if ! git diff --quiet; then
            echo "::error::Prerendered snapshots are stale. Run 'python3 scripts/prerender.py' and commit."
            git diff --stat
            exit 1
          fi
