name: site deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Monthly rebuild so the measured-adoption numbers on /self-governance/
    # never go longer than a month without refreshing.
    - cron: '41 7 1 * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps['deploy-again'].outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # page dateModified is derived from git history
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_TOKEN: ${{ github.token }} # authenticated adoption-count fetch

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist
          # Named per attempt: a follower rerun re-uploads, and deploy-pages
          # refuses a run holding two artifacts with the same name.
          name: github-pages-${{ github.run_attempt }}
      # Pages deployment creation is not retried by the action, and it
      # fails when sibling repos deploy in the same second (fleet-wide
      # merges land simultaneous pushes; ~20% of deploys collided). First
      # attempt is tolerated, a jittered pause desynchronizes the herd,
      # and the second attempt is authoritative.
      - id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
      - name: Desynchronize after a deploy collision
        if: steps.deploy.outcome == 'failure'
        run: sleep $((30 + RANDOM % 90))
      - id: deploy-again
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
